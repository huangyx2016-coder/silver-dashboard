name: Build & Deploy Silver Dashboard
on:
  schedule:
    - cron: '30 1,7 * * *'  # 9:30 & 15:30 Beijing, after main dashboard
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python fetch_and_build.py
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.event.repository.updated_at }}'

      - name: Notify 邓子平
        run: |
          TOKEN=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d '{"app_id":"${{ secrets.FEISHU_APP_ID }}","app_secret":"${{ secrets.FEISHU_APP_SECRET }}"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['tenant_access_token'])")
          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"receive_id":"ou_744c1351a6b58ac8b8e259184cd1dbc8","msg_type":"text","content":"{\"text\":\"银饰仪表盘已更新\nhttps://huangyx2016-coder.github.io/silver-dashboard/\"}"}'
